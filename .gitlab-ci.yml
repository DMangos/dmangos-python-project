variables:
  IMAGE_NAME: dmangos/demo-python-app
  IMAGE_TAG: python-app-v1.0
  TRIVY_CACHE_DIR: .trivycache/
  CS_SEVERITY_THRESHOLD: "critical"
  
stages:
  - test
  - build
  - scan
  - deploy

run_tests:
  stage: test
  image: python:3.10-slim-bookworm
  before_script:
    - apt-get update && apt-get install make
  script:
    - make test


build_image:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo $REGISTRY_PASS| docker login --username $REGISTRY_USER  --password-stdin
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG

container_scanning:
  allow_failure: true
  stage: scan
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  cache:
    key: trivy-cache
    paths:
      - .trivycache/
  script:
    - trivy image --download-db-only --cache-dir .trivycache/
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --scanners vuln --ignore-unfixed --format template --template "@/contrib/gitlab.tpl" --output gl-container-scanning-report.json $IMAGE_NAME:$IMAGE_TAG 
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json   

deploy:
  stage: deploy
  before_script:
    - chmod 400 $AWS_SECRET_ACCESS_KEY
  script:
    - ssh -o StrictHostKeyChecking=no -i $AWS_SECRET_ACCESS_KEY ec2-user@13.60.41.126 "
        echo $REGISTRY_PASS| docker login --username $REGISTRY_USER  --password-stdin &&
        docker ps -a --filter "name=python-app-v1.0" -q | xargs -r docker rm -f &&
        docker rmi dmangos/demo-python-app:python-app-v1.0 -f && 
        docker run -d --name python-app-v1.0 -p5000:5000  $IMAGE_NAME:$IMAGE_TAG" 